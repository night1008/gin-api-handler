basePath: /
definitions:
  main.CreateUserRequest:
    properties:
      age:
        maximum: 150
        minimum: 1
        type: integer
      name:
        type: string
    required:
    - age
    - name
    type: object
  main.CreateUserResponse:
    properties:
      message:
        type: string
      user_id:
        type: integer
    type: object
  main.DeleteUserResponse:
    properties:
      message:
        type: string
    type: object
  main.GetUserResponse:
    properties:
      age:
        type: integer
      message:
        type: string
      name:
        type: string
      user_id:
        type: integer
    type: object
  main.UpdateUserRequest:
    properties:
      age:
        type: integer
      name:
        type: string
      userID:
        type: integer
    type: object
  main.UpdateUserResponse:
    properties:
      message:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: A sample CRUD API using gin-api-handler with Swagger documentation.
  title: Gin API Handler Example
  version: "1.0"
paths:
  /user:
    post:
      consumes:
      - application/json
      description: Create a new user with name and age
      parameters:
      - description: Create user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.CreateUserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Create a user
      tags:
      - users
  /user/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.DeleteUserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Delete a user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Get user information by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.GetUserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      summary: Get a user
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update user information by user ID
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: integer
      - description: Update user request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/main.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/main.UpdateUserResponse'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
      summary: Update a user
      tags:
      - users
swagger: "2.0"
